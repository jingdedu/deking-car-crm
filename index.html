<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>덕킹 CRM V2 Cloud</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;font-family:Arial,'Noto Sans KR','Microsoft YaHei',sans-serif;background:#f3f6fa;color:#111}header{background:#0B1F3A;color:white;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}.wrap{display:flex}.nav{width:220px;background:white;min-height:calc(100vh - 62px);border-right:1px solid #ddd;padding:10px}.nav button{display:block;width:100%;margin:5px 0;padding:11px;border:0;border-radius:9px;background:white;text-align:left;cursor:pointer}.nav button.on,.nav button:hover{background:#EAF3FB;font-weight:bold}.main{flex:1;padding:18px}.card{background:white;border:1px solid #ddd;border-radius:13px;padding:15px;margin-bottom:15px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.kpi{background:white;border-left:5px solid #1F4E79;border-radius:13px;padding:15px}.kpi b{font-size:26px;color:#0B1F3A}table{border-collapse:collapse;width:100%;background:white}th,td{border-bottom:1px solid #eee;padding:9px;font-size:13px;text-align:left}th{background:#17365D;color:white}input,select,textarea{width:100%;padding:9px;border:1px solid #ccc;border-radius:8px}.btn{border:0;background:#1F4E79;color:white;padding:9px 13px;border-radius:8px;cursor:pointer}.btn.gray{background:#64748b}.btn.green{background:#15803d}.form{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.f label{font-size:12px;color:#666;font-weight:bold}.modal{display:none;position:fixed;inset:0;background:#0007;align-items:center;justify-content:center;padding:15px}.box{background:white;border-radius:14px;padding:16px;width:min(900px,100%);max-height:90vh;overflow:auto}.badge{padding:4px 7px;border-radius:99px;background:#eee;font-size:12px;font-weight:bold}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:10px;padding:10px}@media(max-width:800px){.wrap{display:block}.nav{width:100%;min-height:auto;display:flex;overflow:auto}.nav button{min-width:145px}.grid{grid-template-columns:1fr 1fr}.form{grid-template-columns:1fr}}</style></head><body><header><div><b>덕킹 중고차 대행경매 CRM V2 Cloud</b><br><small>电脑/手机云端同步 · Supabase</small></div><div><span id="conn">연결 안됨</span> <button class="btn gray" onclick="configForm()">Supabase 설정</button></div></header><div class="wrap"><div class="nav" id="nav"></div><div class="main" id="main"></div></div><div class="modal" id="modal"><div class="box"><h2 id="mt"></h2><div id="mb"></div><br><button class="btn gray" onclick="closeM()">닫기</button></div></div><script>
const pages=[['dash','📊 대시보드'],['cust','👥 고객관리'],['veh','🔍 차량찾기'],['auc','🔨 경매관리'],['deal','💰 수익관리'],['fol','📞 팔로업'],['model','🚗 차량DB']];let cur='dash',cfg=JSON.parse(localStorage.getItem('dk_cfg')||'{}'),sb=null,S={customers:[],vehicle_search:[],auctions:[],deals:[],follow_logs:[],car_models:[]};const $=i=>document.getElementById(i),today=()=>new Date().toISOString().slice(0,10),money=n=>Number(n||0).toLocaleString('ko-KR');function q(v){return (v??'')}function tab(h,r){return `<div style="overflow:auto"><table><thead><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${r.map(a=>`<tr>${a.map(x=>`<td>${q(x)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}function openM(t,b){$('mt').innerHTML=t;$('mb').innerHTML=b;$('modal').style.display='flex';bind()}function closeM(){$('modal').style.display='none'}function val(id){return $(id)?.value||''}function brandList(){return [...new Set(S.car_models.map(x=>x.brand).filter(Boolean))]}function modelList(b){return [...new Set(S.car_models.filter(x=>!b||x.brand==b).map(x=>x.model).filter(Boolean))]}function gradeList(b,m){return [...new Set(S.car_models.filter(x=>(!b||x.brand==b)&&(!m||x.model==m)).map(x=>x.grade).filter(Boolean))]}function fields(p,fs){return `<div class="form">${fs.map(f=>`<div class="f"><label>${f.l}</label>${f.t=='select'?`<select id="${p}_${f.k}" class="${f.c||''}" data-p="${p}">${(f.o||[]).map(o=>`<option ${o==f.v?'selected':''}>${o}</option>`).join('')}</select>`:f.t=='textarea'?`<textarea id="${p}_${f.k}">${q(f.v)}</textarea>`:`<input id="${p}_${f.k}" type="${f.t||'text'}" value="${q(f.v)}">`}</div>`).join('')}</div>`}function car(p,o={}){let b=o.brand||brandList()[0],m=o.model||modelList(b)[0];return[{k:'brand',l:'브랜드/品牌',t:'select',o:brandList(),v:b,c:'brand'},{k:'model',l:'세부모델/车型',t:'select',o:modelList(b),v:m,c:'model'},{k:'grade',l:'등급/配置',t:'select',o:gradeList(b,m),v:o.grade}] }function bind(){document.querySelectorAll('.brand').forEach(e=>e.onchange=()=>{let p=e.dataset.p,m=$(p+'_model'),g=$(p+'_grade');m.innerHTML=modelList(e.value).map(x=>`<option>${x}</option>`).join('');g.innerHTML=gradeList(e.value,m.value).map(x=>`<option>${x}</option>`).join('')});document.querySelectorAll('.model').forEach(e=>e.onchange=()=>{let p=e.dataset.p,b=$(p+'_brand'),g=$(p+'_grade');g.innerHTML=gradeList(b.value,e.value).map(x=>`<option>${x}</option>`).join('')})}function name(id){return (S.customers.find(c=>c.id==id)||{}).name||''}function profit(d){return (+d.broker_fee||0)+(+d.loan_fee||0)+(+d.insurance_fee||0)+(+d.extra_profit||0)+(+d.car_profit||0)}async function load(){for(let t of Object.keys(S)){let r=await sb.from(t).select('*').order('created_at',{ascending:false});S[t]=r.data||[]}}function nav(){ $('nav').innerHTML=pages.map((p,i)=>`<button class="${i?'':'on'}" onclick="show('${p[0]}',this)">${p[1]}</button>`).join('')}function show(p,b){cur=p;document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('on'));if(b)b.classList.add('on');render()}async function init(){nav();if(cfg.url&&cfg.key){sb=supabase.createClient(cfg.url,cfg.key);$('conn').innerText='연결됨';await load();render();['customers','vehicle_search','auctions','deals','follow_logs'].forEach(t=>sb.channel(t).on('postgres_changes',{event:'*',schema:'public',table:t},async()=>{await load();render()}).subscribe())}else{configForm();render()}}function render(){if(cur=='dash')dash();if(cur=='cust')cust();if(cur=='veh')veh();if(cur=='auc')auc();if(cur=='deal')deal();if(cur=='fol')fol();if(cur=='model')models()}function dash(){let due=S.customers.filter(c=>c.next_contact&&c.next_contact<=today()&&!['계약완료','已成交','이탈','已流失'].includes(c.status)),ta=S.vehicle_search.filter(v=>v.auction_date==today()),mon=today().slice(0,7),ds=S.deals.filter(d=>(d.deal_date||'').slice(0,7)==mon);$('main').innerHTML=`<div class="grid"><div class="kpi">오늘 연락<br><b>${due.length}</b></div><div class="kpi">오늘 입찰<br><b>${ta.length}</b></div><div class="kpi">월계약<br><b>${ds.length}</b></div><div class="kpi">월수익<br><b>${money(ds.reduce((s,d)=>s+profit(d),0))}</b></div></div><div class="card"><h2>오늘 우선 연락 고객 / 今日优先联系</h2>${tab(['고객','전화','차량','상태','다음연락'],due.map(c=>[c.name,c.phone,`${c.brand||''} ${c.model||''}`,c.status,c.next_contact]))}</div><div class="card"><h2>오늘 입찰 차량</h2>${tab(['고객','경매장','차량','예상가','일자'],ta.map(v=>[name(v.customer_id),v.auction_place,`${v.brand} ${v.model}`,money(v.expected_price),v.auction_date]))}</div>`}function cust(){$('main').innerHTML=`<h2>고객관리</h2><button class="btn" onclick="custForm()">신규 고객</button><br><br>${tab(['번호','이름','전화','차량','예산','상태','다음','관리'],S.customers.map(c=>[c.customer_no,c.name,c.phone,`${c.brand||''} ${c.model||''}`,money(c.budget),c.status,c.next_contact,`<button class="btn gray" onclick="custForm('${c.id}')">수정</button>`]))}`}function custForm(id){let c=S.customers.find(x=>x.id==id)||{source:'抖音',status:'신규고객',last_contact:today(),next_contact:today()};openM('고객 등록',fields('c',[{k:'customer_no',l:'고객번호',v:c.customer_no},{k:'name',l:'고객명',v:c.name},{k:'phone',l:'전화',v:c.phone},{k:'wechat',l:'위챗',v:c.wechat},{k:'kakao',l:'카카오',v:c.kakao},{k:'source',l:'유입',t:'select',o:['抖音','直播','小红书','微信','Kakao','Naver'],v:c.source},...car('c',c),{k:'budget',l:'예산',t:'number',v:c.budget},{k:'probability',l:'확률',t:'select',o:['95% 基本成交','80% 高概率','60% 有机会','40% 观望'],v:c.probability},{k:'status',l:'상태',t:'select',o:['신규고객','차량검색중','추천완료','입찰대기','입찰중','계약완료','출고완료','이탈'],v:c.status},{k:'last_contact',l:'마지막',t:'date',v:c.last_contact},{k:'next_contact',l:'다음',t:'date',v:c.next_contact},{k:'memo',l:'메모',t:'textarea',v:c.memo}])+`<br><button class="btn green" onclick="saveCust('${id||''}')">저장</button>`)}async function saveCust(id){let o={customer_no:val('c_customer_no'),name:val('c_name'),phone:val('c_phone'),wechat:val('c_wechat'),kakao:val('c_kakao'),source:val('c_source'),brand:val('c_brand'),model:val('c_model'),grade:val('c_grade'),budget:val('c_budget')||null,probability:val('c_probability'),status:val('c_status'),last_contact:val('c_last_contact')||null,next_contact:val('c_next_contact')||null,memo:val('c_memo')};id?await sb.from('customers').update(o).eq('id',id):await sb.from('customers').insert(o);closeM();await load();cust()}function veh(){$('main').innerHTML=`<h2>차량찾기</h2><button class="btn" onclick="vehForm()">차량 추가</button><br><br>${tab(['고객','경매장','차량','연식','km','예상','일자','관리'],S.vehicle_search.map(v=>[name(v.customer_id),v.auction_place,`${v.brand} ${v.model}`,v.year,money(v.mileage),money(v.expected_price),v.auction_date,`<button class="btn gray" onclick="vehForm('${v.id}')">수정</button>`]))}`}function vehForm(id){let v=S.vehicle_search.find(x=>x.id==id)||{customer_id:S.customers[0]?.id,auction_place:'Glovis',auction_date:today()};openM('차량 등록',fields('v',[{k:'customer_id',l:'고객',t:'select',o:S.customers.map(c=>c.id),v:v.customer_id},{k:'auction_place',l:'경매장',v:v.auction_place},...car('v',v),{k:'year',l:'연식',t:'number',v:v.year},{k:'mileage',l:'km',t:'number',v:v.mileage},{k:'start_price',l:'시작가',t:'number',v:v.start_price},{k:'expected_price',l:'예상가',t:'number',v:v.expected_price},{k:'market_price',l:'시세',t:'number',v:v.market_price},{k:'auction_date',l:'입찰일',t:'date',v:v.auction_date},{k:'memo',l:'메모',t:'textarea',v:v.memo}])+`<br><button class="btn green" onclick="saveVeh('${id||''}')">저장</button>`)}async function saveVeh(id){let o={customer_id:val('v_customer_id'),auction_place:val('v_auction_place'),brand:val('v_brand'),model:val('v_model'),grade:val('v_grade'),year:val('v_year')||null,mileage:val('v_mileage')||null,start_price:val('v_start_price')||null,expected_price:val('v_expected_price')||null,market_price:val('v_market_price')||null,auction_date:val('v_auction_date')||null,memo:val('v_memo')};id?await sb.from('vehicle_search').update(o).eq('id',id):await sb.from('vehicle_search').insert(o);closeM();await load();veh()}function auc(){$('main').innerHTML=`<h2>경매관리</h2>${tab(['고객','경매장','일자','최고가','낙찰가','결과'],S.auctions.map(a=>[name(a.customer_id),a.auction_place,a.auction_date,money(a.max_bid),money(a.final_price),a.result]))}`}function deal(){$('main').innerHTML=`<h2>수익관리</h2>${tab(['고객','차량','계약가','총수익','출고'],S.deals.map(d=>[name(d.customer_id),`${d.brand} ${d.model}`,money(d.deal_price),money(profit(d)),d.delivery_date]))}`}function fol(){$('main').innerHTML=`<h2>팔로업</h2>${tab(['고객','날짜','방식','내용','다음'],S.follow_logs.map(f=>[name(f.customer_id),f.contact_date,f.method,f.content,f.next_contact]))}`}function models(){$('main').innerHTML=`<h2>차량DB</h2>${tab(['브랜드','Brand','모델','Model EN','등급'],S.car_models.map(m=>[m.brand,m.brand_en,m.model,m.model_en,m.grade]))}`}function configForm(){openM('Supabase 설정',`<div class="notice">Project URL과 anon public key를 붙여넣으세요. service_role key는 절대 입력하지 마세요.</div>${fields('cfg',[{k:'url',l:'Project URL',v:cfg.url},{k:'key',l:'anon public key',v:cfg.key}])}<br><button class="btn green" onclick="saveCfg()">저장 후 연결</button>`)}async function saveCfg(){cfg={url:val('cfg_url'),key:val('cfg_key')};localStorage.setItem('dk_cfg',JSON.stringify(cfg));sb=supabase.createClient(cfg.url,cfg.key);$('conn').innerText='연결됨';closeM();await load();render()}init();
</script></body></html>
